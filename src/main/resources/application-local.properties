spring.datasource.url=jdbc:postgresql://localhost:5432/komornik
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.flyway.locations=classpath:db/migration,classpath:db/testdata

url=http://localhost:8080
frontend.url=http://localhost:4200
# Importy dev w jarze
spring.config.import=optional:classpath:daneDoKontLocal.properties,classpath:common.properties,classpath:mailDev.properties
# Debugi dla dev
logging.level.org.springframework.security=debug
logging.level.org.springframework.security.oauth2=debug
logging.level.com.janis.komornikgpt.auth=debug
jwt.cookie.secure=false
