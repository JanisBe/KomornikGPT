# Konfiguracja H2 dla generowania specyfikacji OpenAPI w CI
spring.datasource.url=jdbc:h2:mem:komornikdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
url=http://localhost:8080
frontend.url=http://localhost:4200
# Minimalna konfiguracja wymagana przez aplikację
jwt.secret=c2VjcmV0S2V5Rm9yVGVzdGluZ09ubHlOb3RGb3JQcm9kdWN0aW9uSzIwMjQ=
jwt.expiration=900000
jwt.cookie.name=JWT_TOKEN
jwt.cookie.expiration=900
jwt.cookie.secure=false
jwt.cookie.domain=
jwt.refresh.cookie.name=REFRESH_TOKEN
jwt.refresh.expirationMs=604800000
# Dummy mail (bean musi istnieć, ale nie będzie używany)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=noreply@localhost
spring.mail.password=dummy
# Dummy OAuth2 (wymagane przez SecurityConfig, nie będą używane)
spring.security.oauth2.client.registration.google.client-id=dummy
spring.security.oauth2.client.registration.google.client-secret=dummy
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.github.client-id=dummy
spring.security.oauth2.client.registration.github.client-secret=dummy
spring.security.oauth2.client.registration.github.scope=user:email
